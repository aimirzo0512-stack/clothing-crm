<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleCRM — Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="brand"><span>👕</span> StyleCRMMMMMMMMMMMM</div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your store dashboard</p>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input class="form-control" id="username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="form-control" id="password" type="password" required autocomplete="current-password" />
        </div>
        <div class="error-text" id="err"></div>
        <button class="btn btn-primary btn-block" type="submit">Sign in</button>
      </form>
      <p class="mt-4 muted" style="text-align:center">No account? <a href="register.html" style="color:var(--accent);font-weight:600">Register</a></p>
      <p class="mt-2 muted" style="text-align:center;font-size:12px">Demo: admin / password123</p>
    </div>
  </div>
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>
  <div id="toast-container"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    if (Auth.isLoggedIn()) location.href = 'dashboard.html';
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('err').textContent = '';
      try {
        const data = await API.post('/auth/login', {
          username: username.value.trim(), password: password.value
        });
        Auth.save(data);
        UI.toast('Welcome, ' + (data.fullName || data.username));
        setTimeout(() => location.href = 'dashboard.html', 400);
      } catch (err) {
        document.getElementById('err').textContent = err.message;
      }
    });
  </script>
</body>
</html>

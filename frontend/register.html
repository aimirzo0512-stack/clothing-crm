<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleCRM — Register</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="brand"><span>\u{1F455}</span> StyleCRM</div>
      <h1>Create account</h1>
      <p class="subtitle">Register a new staff account</p>
      <form id="register-form">
        <div class="form-row">
          <div class="form-group">
            <label>Username</label>
            <input class="form-control" id="username" required minlength="3" />
          </div>
          <div class="form-group">
            <label>Full name</label>
            <input class="form-control" id="fullName" />
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" id="email" type="email" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <input class="form-control" id="password" type="password" required minlength="6" />
          </div>
          <div class="form-group">
            <label>Role</label>
            <select class="form-control" id="role">
              <option value="EMPLOYEE">Employee</option>
              <option value="SALES_MANAGER">Sales Manager</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
        </div>
        <div class="error-text" id="err"></div>
        <button class="btn btn-primary btn-block" type="submit">Create account</button>
      </form>
      <p class="mt-4 muted" style="text-align:center">Already have an account? <a href="index.html" style="color:var(--accent);font-weight:600">Sign in</a></p>
    </div>
  </div>
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>
  <div id="toast-container"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('err').textContent = '';
      try {
        const data = await API.post('/auth/register', {
          username: username.value.trim(), fullName: fullName.value.trim(),
          email: email.value.trim(), password: password.value, role: role.value
        });
        Auth.save(data);
        UI.toast('Account created!');
        setTimeout(() => location.href = 'dashboard.html', 500);
      } catch (err) {
        document.getElementById('err').textContent = err.message;
      }
    });
  </script>
</body>
</html>

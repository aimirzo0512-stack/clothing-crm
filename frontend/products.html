<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleCRM — Products</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    Auth.guard();
    UI.layout('products.html', 'Products');
    document.getElementById('content').innerHTML = `
      <div class="toolbar">
        <input class="form-control search" id="search" placeholder="Search products..." />
        <select class="form-control" id="catFilter" style="max-width:180px"><option value="">All categories</option></select>
        <button class="btn btn-primary" id="addBtn">+ Add product</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Size</th><th>Color</th><th>Price</th><th>Stock</th><th></th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="pagination" id="pager"></div>
      </div>

      <div class="modal-overlay" id="modal">
        <div class="modal">
          <div class="modal-header"><h3 id="modalTitle">Add product</h3><button class="close-x" onclick="UI.closeModal('modal')">\u00D7</button></div>
          <form id="form">
            <div class="modal-body">
              <input type="hidden" id="pid" />
              <div class="form-group"><label>Name</label><input class="form-control" id="name" required></div>
              <div class="form-row">
                <div class="form-group"><label>Category</label><select class="form-control" id="categoryId"></select></div>
                <div class="form-group"><label>Price</label><input class="form-control" id="price" type="number" step="0.01" min="0" required></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Size</label><input class="form-control" id="size"></div>
                <div class="form-group"><label>Color</label><input class="form-control" id="color"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Stock quantity</label><input class="form-control" id="stockQuantity" type="number" min="0" required></div>
                <div class="form-group"><label>Low-stock threshold</label><input class="form-control" id="lowStockThreshold" type="number" min="0" value="10"></div>
              </div>
              <div class="form-group"><label>Image URL</label><input class="form-control" id="imageUrl" placeholder="https://..."></div>
              <div class="form-group"><label>Description</label><textarea class="form-control" id="description" rows="2"></textarea></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" onclick="UI.closeModal('modal')">Cancel</button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </div>
      </div>`;
  </script>
  <script src="js/products.js"></script>
</body>
</html>

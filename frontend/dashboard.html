<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleCRM — Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    Auth.guard();
    UI.layout('dashboard.html', 'Dashboard');
    document.getElementById('content').innerHTML = `
      <div class="stats-grid" id="stats"></div>
      <div class="grid-2">
        <div class="panel">
          <div class="panel-header"><h2>Sales (last 14 days)</h2></div>
          <div class="panel-body"><canvas id="salesChart" height="110"></canvas></div>
        </div>
        <div class="panel">
          <div class="panel-header"><h2>Recent activity</h2></div>
          <div class="panel-body" id="activity"><div class="spinner"></div></div>
        </div>
      </div>`;
  </script>
  <script src="js/dashboard.js"></script>
</body>
</html>

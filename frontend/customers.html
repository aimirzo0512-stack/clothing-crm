<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleCRM — Customers</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    Auth.guard();
    UI.layout('customers.html', 'Customers');
    document.getElementById('content').innerHTML = `
      <div class="toolbar">
        <input class="form-control search" id="search" placeholder="Search by name, email or phone..." />
        <select class="form-control" id="statusFilter" style="max-width:160px">
          <option value="">All statuses</option>
          <option>ACTIVE</option><option>VIP</option><option>INACTIVE</option><option>BLOCKED</option>
        </select>
        <button class="btn btn-secondary" id="exportBtn">\u2B07\uFE0F Export CSV</button>
        <button class="btn btn-primary" id="addBtn">+ Add customer</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Full name</th><th>Email</th><th>Phone</th><th>Total purchases</th><th>Loyalty</th><th>Status</th><th></th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="pagination" id="pager"></div>
      </div>

      <div class="modal-overlay" id="modal">
        <div class="modal">
          <div class="modal-header"><h3 id="modalTitle">Add customer</h3><button class="close-x" onclick="UI.closeModal('modal')">\u00D7</button></div>
          <form id="form">
            <div class="modal-body">
              <input type="hidden" id="cid" />
              <div class="form-group"><label>Full name</label><input class="form-control" id="fullName" required></div>
              <div class="form-row">
                <div class="form-group"><label>Email</label><input class="form-control" id="email" type="email" required></div>
                <div class="form-group"><label>Phone number</label><input class="form-control" id="phoneNumber"></div>
              </div>
              <div class="form-group"><label>Address</label><input class="form-control" id="address"></div>
              <div class="form-group"><label>Status</label><select class="form-control" id="status"><option>ACTIVE</option><option>VIP</option><option>INACTIVE</option><option>BLOCKED</option></select></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" onclick="UI.closeModal('modal')">Cancel</button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </div>
      </div>

      <div class="modal-overlay" id="profile">
        <div class="modal">
          <div class="modal-header"><h3>Customer profile</h3><button class="close-x" onclick="UI.closeModal('profile')">\u00D7</button></div>
          <div class="modal-body" id="profileBody"></div>
        </div>
      </div>`;
  </script>
  <script src="js/customers.js"></script>
</body>
</html>

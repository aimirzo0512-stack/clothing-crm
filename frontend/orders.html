<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleCRM — Orders</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    Auth.guard();
    UI.layout('orders.html', 'Orders');
    document.getElementById('content').innerHTML = `
      <div class="toolbar">
        <select class="form-control" id="statusFilter" style="max-width:180px">
          <option value="">All statuses</option>
          <option>PENDING</option><option>PROCESSING</option><option>SHIPPED</option><option>DELIVERED</option><option>CANCELLED</option>
        </select>
        <button class="btn btn-primary" id="addBtn">+ Create order</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Order #</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Created</th><th></th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="pagination" id="pager"></div>
      </div>

      <div class="modal-overlay" id="modal">
        <div class="modal">
          <div class="modal-header"><h3>Create order</h3><button class="close-x" onclick="UI.closeModal('modal')">\u00D7</button></div>
          <form id="form">
            <div class="modal-body">
              <div class="form-group"><label>Customer</label><select class="form-control" id="customerId" required></select></div>
              <label>Items</label>
              <div id="lines"></div>
              <button type="button" class="btn btn-secondary btn-sm mt-2" id="addLine">+ Add item</button>
              <p class="mt-4"><strong>Estimated total: <span id="estTotal">$0.00</span></strong></p>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" onclick="UI.closeModal('modal')">Cancel</button>
              <button type="submit" class="btn btn-primary">Create</button>
            </div>
          </form>
        </div>
      </div>

      <div class="modal-overlay" id="detail">
        <div class="modal">
          <div class="modal-header"><h3>Order details</h3><button class="close-x" onclick="UI.closeModal('detail')">\u00D7</button></div>
          <div class="modal-body" id="detailBody"></div>
        </div>
      </div>`;
  </script>
  <script src="js/orders.js"></script>
</body>
</html>

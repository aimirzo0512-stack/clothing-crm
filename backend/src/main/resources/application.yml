server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: clothing-store-crm
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/clothing_crm}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
    show-sql: false
  sql:
    init:
      mode: never   # set to 'always' to run schema.sql / data.sql on startup
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# JWT configuration
app:
  jwt:
    # Base64-encoded 256-bit secret. Override in production via env var.
    secret: ${JWT_SECRET:Y2xvdGhpbmctc3RvcmUtY3JtLXN1cGVyLXNlY3JldC1rZXktY2hhbmdlLW1lLTEyMzQ1Njc4OTA=}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}        # 24h
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7d
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5500,http://localhost:3000,http://127.0.0.1:5500}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework.security: INFO
    com.clothingstore: DEBUG
